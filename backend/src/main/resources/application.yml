spring:
  application:
    name: finance-project

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:financedb}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000

server:
  port: 8080

fmp:
  api:
    key: ${FMP_API_KEY}
    url: https://financialmodelingprep.com/stable

# FastAPI data-service base URL (yfinance proxy)
data-service:
  base-url: ${DATA_SERVICE_URL:http://localhost:8000}

feign:
  client:
    config:
      default:
        logger-level: BASIC
  circuitbreaker:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true