spring:
  application:
    name: finance-project

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:financedb}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/financedb}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000

server:
  port: 8080

# FastAPI data-service base URL (yfinance/Tiingo/Finnhub proxy)
data-service:
  base-url: ${DATA_SERVICE_URL:http://localhost:8000}

tiingo:
  api-key: ${TIINGO_API_KEY:}

finnhub:
  api-key: ${FINNHUB_API_KEY:}

agent-analysis:
  cache-ttl-minutes: 15

feign:
  client:
    config:
      default:
        logger-level: BASIC
  circuitbreaker:
    enabled: true

# Resilience4j — finnhubApi instance (30 req/s free tier limit)
resilience4j:
  ratelimiter:
    instances:
      finnhubApi:
        limitForPeriod: 30
        limitRefreshPeriod: 1s
        timeoutDuration: 5s
  retry:
    instances:
      finnhubApi:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.HttpClientErrorException$TooManyRequests
          - java.net.SocketTimeoutException
          - java.net.ConnectException
  circuitbreaker:
    instances:
      finnhubApi:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  bulkhead:
    instances:
      finnhubApi:
        maxConcurrentCalls: 10

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  paths-to-match: /api/v1/**
