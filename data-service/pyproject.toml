[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
  "external",
  ".venv",
  "venv",
  "__pycache__",
  ".pytest_cache",
  ".test-cache",
]

[tool.mypy]
python_version = "3.12"
exclude = "^(external|\\.venv|venv|__pycache__|\\.pytest_cache|\\.test-cache)(/|$)"
ignore_missing_imports = true
follow_imports = "silent"
show_error_codes = true
warn_unused_configs = true