[pytest]
addopts = -p no:cacheprovider
testpaths = tests
timeout = 120
norecursedirs = external .venv venv __pycache__ .pytest_cache pytest-cache-files-* .test-cache
cache_dir = .test-cache/pytest
markers =
    smoke: tests that perform live dependency checks
asyncio_mode = auto
filterwarnings =
    ignore:The 'mode.copy_on_write' option is deprecated.*
