name: frontend-ci

on:
  push:
    paths:
      - 'frontend/**'
      - 'AGENTS.md'
      - 'SPEC.md'
      - 'test-results/bugs-found-frontend.jsonl'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'AGENTS.md'
      - 'SPEC.md'
      - 'test-results/bugs-found-frontend.jsonl'
      - '.github/workflows/frontend.yml'

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend unit and coverage tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Install Playwright browsers
        if: always()
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend mocked E2E smoke
        if: always()
        working-directory: frontend
        run: npm run e2e

      - name: Upload frontend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn

      - name: Upload frontend Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn

      - name: Upload frontend bug inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bugs-found
          path: test-results/bugs-found-frontend.jsonl
          if-no-files-found: warn

      - name: Upload frontend build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          if-no-files-found: warn
